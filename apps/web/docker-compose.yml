services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d local"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://root:mysecretpassword@db:5432/local
      ORIGIN: http://localhost:3000
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-in-production-32chars}
      CRON_SECRET: ${CRON_SECRET:-change-me-cron-secret}
      NODE_ENV: production
      PORT: "3000"

volumes:
  postgres_data:
